name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Embed icon, version info and manifest
        run: >
          go-winres make
          --in cmd/typeinc/winres/winres.json
          --out cmd/typeinc/rsrc
          --file-version "${GITHUB_REF_NAME#v}"
          --product-version "${GITHUB_REF_NAME#v}"

      - name: Build TYPE.Inc.exe
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
        run: go build -trimpath -ldflags "-H windowsgui" -o "TYPE.Inc.exe" ./cmd/typeinc

      - name: Package
        run: zip "TYPE.Inc-${GITHUB_REF_NAME}-windows-amd64.zip" "TYPE.Inc.exe"

      - name: Extract changelog section
        run: |
          awk -v ver="${GITHUB_REF_NAME#v}" \
            '$0 ~ "^## \\["ver"\\]" {f=1; next} /^## \[/ {f=0} f' \
            CHANGELOG.md > release_body.md
          if [ ! -s release_body.md ]; then
            echo "No CHANGELOG.md section for ${GITHUB_REF_NAME#v}." > release_body.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: TYPE.Inc-*-windows-amd64.zip
          body_path: release_body.md
          generate_release_notes: true
